services:
  mysql:
    image: mysql:8.0
    container_name: shopsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: shopsphere
      MYSQL_DATABASE: shopsphere
    ports:
      - "3306:3306"
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pshopsphere"]
      interval: 5s
      timeout: 5s
      retries: 25

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shopsphere-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: shopsphere
      DB_NAME: shopsphere
      JWT_SECRET: shopsphere_super_secret_key_change_in_production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

