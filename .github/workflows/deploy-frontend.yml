name: Deploy Next.js Frontend to GitHub Pages

on:
  workflow_dispatch:
  # Auto-trigger disabled: we build locally and commit shop/ directly
  # to avoid race conditions with manual deploys.
  # Re-enable by uncommenting:
  # push:
  #   branches: [ main ]
  #   paths: [ "frontend/**" ]

permissions:
  contents: write

concurrency:
  group: "pages-frontend"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Next.js static export
        working-directory: frontend
        run: npm run build
        # Output lands in frontend/out/

      - name: Deploy to main branch at /shop
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Verify the build output exists
          ls frontend/out || (echo "ERROR: frontend/out missing — build failed" && exit 1)

          # Wipe old shop/ and replace with fresh static export
          rm -rf shop
          cp -r frontend/out shop

          # .nojekyll tells GitHub Pages NOT to filter _next/ underscore folders
          touch shop/.nojekyll

          git add shop/
          git diff --cached --quiet \
            && echo "No frontend changes to deploy." \
            || ( git commit -m "chore: deploy Next.js frontend [skip ci]" \
                 && git push origin main )
